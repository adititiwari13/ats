# Server Configuration
server.port=8080

# Database Configuration (H2 Enabled - Temporary Stability)
spring.datasource.url=jdbc:h2:mem:ats_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# MySQL Configuration (Commented out - paste password into spring.datasource.password to enable)
# spring.datasource.url=jdbc:mysql://localhost:3306/ats_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true

# JWT Configuration
app.jwt.secret=YTJmNGI4ZTYxZjNhNDk2NmIzMzVkMGU5OGE3YzFiMjNhNGI1NjcxMmFiY2RlZjAxMjM0NTY3ODlhYmNkZWYw
app.jwt.expiration-ms=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# Email Configuration (Optional - configure with your SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS
app.cors.allowed-origins=http://localhost:5173
